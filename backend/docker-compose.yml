services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongo:27017/sharevault
      FRONTEND_URI: ${FRONTEND_URI:-http://localhost:5173}
      LOG_LEVEL: info
      TRUST_PROXY: "1"
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    ports:
      - "5000:5000"
    volumes:
      - uploads-data:/app/uploads

volumes:
  mongo-data:
  uploads-data:
